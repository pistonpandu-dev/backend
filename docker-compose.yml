version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rayan-postgres
    environment:
      POSTGRES_USER: rayan
      POSTGRES_PASSWORD: rayan123
      POSTGRES_DB: rayan_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rayan-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rayan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rayan-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rayan-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://rayan:rayan123@postgres:5432/rayan_admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - rayan-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: rayan-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - rayan-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  rayan-network:
    driver: bridge
